<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSD 固件版本号工具</title>
  <link rel="stylesheet" href="src/css/common.css" />
  <link rel="stylesheet" href="src/css/style.css" />
</head>
<body>
  <!-- 夜间模式切换按钮 -->
  <button class="theme-toggle" id="themeToggle" aria-label="切换夜间模式">
    <svg viewBox="0 0 24 24" id="themeIcon">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
    </svg>
  </button>

  <div class="container">
    <h1>
      🛠️ SSD 固件版本号工具
      <small>生成 · 解析</small>
    </h1>
    <div class="sub">
      格式：<strong>S + 日期编码(3) + PCB尺寸(1) + DRAM大小(1) + 封装(1) + 颗粒数(1)</strong>
    </div>

    <!-- 选项卡 -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="generate">🚀 生成</button>
      <button class="tab-btn" data-tab="parse">🔍 解析</button>
    </div>

    <!-- 消息 -->
    <div id="message" class="message"></div>

    <!-- 生成面板 -->
    <div id="panel-generate" class="panel active">
      <div class="form-grid">
        <div class="field">
          <label>📅 生产日期</label>
          <input type="date" id="gen-date" value="2025-12-01" min="2010-04-15" max="2099-12-31" />
          <div class="hint">范围：2010-04-15 ~ 2099-12-31</div>
        </div>
        <div class="field">
          <label>📐 PCB 尺寸</label>
          <select id="gen-pcb"></select>
        </div>
        <div class="field">
          <label>💾 DRAM 大小</label>
          <div class="dram-group">
            <input type="number" id="gen-dram" value="1024" min="-1" step="1" />
            <button id="dramless-btn">DRAMLess</button>
          </div>
          <div class="hint">输入 MB 数（2的整数次方，最小128MB），或点 DRAMLess（-1）</div>
        </div>
        <div class="field">
          <label>📦 封装类型</label>
          <select id="gen-package"></select>
        </div>
        <div class="field">
          <label>🔢 颗粒数量</label>
          <input type="number" id="gen-chips" value="4" min="1" max="16" />
          <div class="hint">1 ~ 16</div>
        </div>
      </div>
      <div class="action-row">
        <button class="btn btn-primary" id="generate-btn">⚡ 生成固件版本号</button>
      </div>
      <div id="gen-result" class="result-box" style="display:none;">
        <span class="label">生成结果：</span>
        <span class="code" id="gen-code"></span>
        <button class="copy-btn" id="copy-gen-btn">📋 复制</button>
      </div>
    </div>

    <!-- 解析面板 -->
    <div id="panel-parse" class="panel">
      <div class="parse-input-row">
        <label>固件版本号</label>
        <input type="text" id="parse-input" placeholder="例如 S01E13A4" />
        <button class="btn btn-primary" id="parse-btn">🔍 解析</button>
      </div>
      <div id="parse-result" class="result-box" style="display:none;">
        <table class="parse-table" id="parse-table">
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="footer-note">
      <a href="https://github.com/M0rt1s0114/FFW_Decode_Tool" target="_blank" rel="noopener noreferrer" class="github-link">
        <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor" style="display:inline-block; vertical-align:middle; margin-right:6px;">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        <span>项目地址</span>
      </a>
    </div>
  </div>

  <script type="module" src="src/js/app.js"></script>
  <script>
    // 主题切换逻辑
    (function() {
      const toggle = document.getElementById('themeToggle');
      const html = document.documentElement;
      const icon = document.getElementById('themeIcon');

      // 获取当前主题
      function getTheme() {
        return html.getAttribute('data-theme') || 'light';
      }

      // 设置主题
      function setTheme(theme) {
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        updateIcon(theme);
      }

      // 更新图标
      function updateIcon(theme) {
        if (theme === 'dark') {
          icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />';
        } else {
          icon.innerHTML = '<circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />';
        }
      }

      // 切换主题
      toggle.addEventListener('click', () => {
        const current = getTheme();
        setTheme(current === 'dark' ? 'light' : 'dark');
      });

      // 初始化：读取存储或系统偏好
      const saved = localStorage.getItem('theme');
      if (saved) {
        setTheme(saved);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        setTheme('dark');
      } else {
        setTheme('light');
      }

      // 监听系统主题变化
      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
          if (!localStorage.getItem('theme')) {
            setTheme(e.matches ? 'dark' : 'light');
          }
        });
      }
    })();
  </script>
</body>
</html>
